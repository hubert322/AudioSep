---
task_name: AudioSep_Transformer

data:
    datafiles:
        - 'datafiles/fsd50k_dev_16k.json'

    sampling_rate: 16000
    segment_seconds: 5
    loudness_norm:
        lower_db: -10
        higher_db: 10
    max_mix_num: 2
    val_csv: '/scratch/th3622/machine-listening/2024-lass-dataset/val/lass_synthetic_validation.csv'
    val_audio_path: '/scratch/th3622/machine-listening/2024-lass-dataset/val/lass_validation'

model:
    query_net: CLAP
    condition_size: 512
    model_type: ResUNet30
    input_channels: 1
    output_channels: 1
    resume_checkpoint: ""
    use_text_ratio: 1.0
    window_size: 1024
    hop_size: 160
    use_transformer_bottleneck: true
    transformer_config:
        text_embed_dim: 512
        d_model: 384
        nhead: 8
        num_layers: 4
        dim_feedforward: 1536
        dropout: 0.1

train:
    optimizer:
        optimizer_type: AdamW
        learning_rate: 1e-4 # Slightly lower LR is often better for Transformers
        warm_up_steps: 10000
        reduce_lr_steps: 1000000
        lr_lambda_type: constant_warm_up
    num_nodes: 1
    num_workers: 6
    loss_type: l1_wav
    sync_batchnorm: True
    batch_size_per_device: 32
    steps_per_epoch: 10000  # Every 10000 steps is called an `epoch`.
    evaluate_step_frequency: 2000     # Evaluate every #evaluate_step_frequency steps.
    save_step_frequency: 2000  # Save every #save_step_frequency steps.
    early_stop_steps: 10000001
    random_seed: 1234
