---
task_name: AudioSep_Curriculum_Full

data:
    curriculum_manifest: 'datafiles/curriculum/sources.json'
    source_embeddings: 'datafiles/curriculum/source_embeddings.npy'

    sampling_rate: 16000
    segment_seconds: 10
    loudness_norm:
        lower_db: -10
        higher_db: 10
    max_mix_num: 2
    val_csv: '/scratch/th3622/machine-listening/2024-lass-dataset/val/lass_synthetic_validation.csv'
    val_audio_path: '/scratch/th3622/machine-listening/2024-lass-dataset/val/lass_validation'
    curriculum:
        seed: 2234
        epoch_steps: 10000
        max_sampling_attempts: 500
        audio_load_attempts: 20
        max_similarity: 0.29
        min_similarity: null
        negative_ratio: 0.10
        negative_max_similarity: 0.03
        stages:
            - name: full_easy
              portion: 0.13333333333333333
              min_similarity: null
              max_similarity: 0.125
              negative_ratio: 0.05
              pair_bands:
                  - name: easy
                    weight: 0.85
                    min_similarity: null
                    max_similarity: 0.06
                  - name: medium
                    weight: 0.15
                    min_similarity: 0.06
                    max_similarity: 0.125
            - name: full_medium
              portion: 0.13333333333333333
              min_similarity: null
              max_similarity: 0.29
              negative_ratio: 0.08
              pair_bands:
                  - name: easy
                    weight: 0.60
                    min_similarity: null
                    max_similarity: 0.06
                  - name: medium
                    weight: 0.30
                    min_similarity: 0.06
                    max_similarity: 0.19
                  - name: hard
                    weight: 0.10
                    min_similarity: 0.19
                    max_similarity: 0.29
            - name: full_hard
              portion: 0.2
              min_similarity: null
              max_similarity: 0.29
              negative_ratio: 0.10
              pair_bands:
                  - name: easy
                    weight: 0.45
                    min_similarity: null
                    max_similarity: 0.06
                  - name: medium
                    weight: 0.35
                    min_similarity: 0.06
                    max_similarity: 0.19
                  - name: hard
                    weight: 0.20
                    min_similarity: 0.19
                    max_similarity: 0.29
            - name: full_hard_upper
              min_similarity: null
              max_similarity: 0.29
              negative_ratio: 0.10
              pair_bands:
                  - name: easy
                    weight: 0.35
                    min_similarity: null
                    max_similarity: 0.06
                  - name: medium
                    weight: 0.40
                    min_similarity: 0.06
                    max_similarity: 0.19
                  - name: hard
                    weight: 0.25
                    min_similarity: 0.19
                    max_similarity: 0.29

model:
    query_net: CLAP
    condition_size: 512
    model_type: ResUNet30
    input_channels: 1
    output_channels: 1
    resume_checkpoint: ""
    use_text_ratio: 1.0
    window_size: 1024
    hop_size: 160
    use_transformer_bottleneck: true
    transformer_config:
        text_embed_dim: 512
        d_model: 384
        nhead: 8
        num_layers: 4
        dim_feedforward: 1536
        dropout: 0.1

train:
    optimizer:
        optimizer_type: AdamW
        learning_rate: 5e-5
        warm_up_steps: 2000
        reduce_lr_steps: 100000
        lr_lambda_type: linear_warm_up
    num_nodes: 1
    num_workers: 6
    loss_type: l1_wav
    negative_loss_weight: 0.5
    sync_batchnorm: True
    use_distributed_sampler: False
    batch_size_per_device: 32
    steps_per_epoch: 10000
    evaluate_step_frequency: 2000
    save_step_frequency: 2000
    early_stop_steps: 10000001
    random_seed: 1234
