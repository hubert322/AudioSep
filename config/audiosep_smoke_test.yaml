task_name: AudioSep_SmokeTest

data:
    datafiles:
        - 'datafiles/smoke_test.json'

    sampling_rate: 32000
    segment_seconds: 5
    loudness_norm:
        lower_db: -10
        higher_db: 10
    max_mix_num: 2

model:
    query_net: CLAP
    condition_size: 512
    model_type: ResUNet30
    input_channels: 1
    output_channels: 1
    resume_checkpoint: ""
    use_text_ratio: 1.0

train:
    optimizer:
        optimizer_type: AdamW
        learning_rate: 1e-4
        warm_up_steps: 100
        reduce_lr_steps: 1000
        lr_lambda_type: constant_warm_up
    num_nodes: 1
    num_workers: 0  # Set to 0 for easier debugging on local machine
    loss_type: l1_wav
    sync_batchnorm: False
    batch_size_per_device: 2
    steps_per_epoch: 10
    evaluate_step_frequency: 10
    save_step_frequency: 10
    early_stop_steps: 100
    random_seed: 1234
